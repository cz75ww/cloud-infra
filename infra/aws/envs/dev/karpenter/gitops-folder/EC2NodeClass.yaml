apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest
  role: "dev-demo-karpenter-node"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "dev-demo"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "dev-demo"
