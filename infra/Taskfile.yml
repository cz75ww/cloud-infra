version: "3"

vars:
  ENV: '{{.ENV | default "dev"}}'
  BASE: "aws/envs/{{.ENV}}"

  # Define deployment order
  COMPONENTS: "vpc eks cilium group-nodes platform/eks-addons platform/alb-controller platform/argo-cd karpenter"

tasks:
  default:
    silent: true
    cmds:
      - task --list
      - echo ""
      - echo "Order vpc > eks > cilium > group-nodes > platform/eks-addons > platform/alb-controller > platform/argo-cd > karpenter"

  up:
    desc: "Deploy Full Stack"
    cmds:
      - echo "Starting deployment..."
      - echo ""
      - for: { var: COMPONENTS, split: " " }
        task: deploy-component
        vars:
          COMPONENT: "{{.ITEM}}"
          INDEX: "{{.FOR_INDEX}}"
      - task: kubeconfig
      - echo ""
      - echo "Deployment complete!"

  down:
    desc: "Destroy Everything (Reverse Order)"
    prompt: "Destroy {{.ENV}}?"
    vars:
      # Reverse the components list
      COMPONENTS_REV: "karpenter platform/argo-cd platform/alb-controller platform/eks-addons group-nodes cilium eks vpc"
    cmds:
      - echo "Starting destruction..."
      - echo ""
      - for: { var: COMPONENTS_REV, split: " " }
        task: destroy-component
        vars:
          COMPONENT: "{{.ITEM}}"
          INDEX: "{{.FOR_INDEX}}"
      - echo ""
      - echo "Destroy complete!"

  # Internal task for deployment
  deploy-component:
    internal: true
    cmds:
      - echo "[{{.INDEX}}/8] Deploying {{.COMPONENT}}..."
      - task: apply
        vars: { COMPONENT: "{{.COMPONENT}}" }
      - echo "{{.COMPONENT}} deployed"
      - echo ""

  # Internal task for destruction
  destroy-component:
    internal: true
    cmds:
      - echo "[{{.INDEX}}/8] Destroying {{.COMPONENT}}..."
      - task: destroy
        vars: { COMPONENT: "{{.COMPONENT}}" }
      - echo "{{.COMPONENT}} destroyed"
      - echo ""

  apply:
    desc: "Apply component (task apply COMPONENT=vpc)"
    dir: "{{.BASE}}/{{.COMPONENT}}"
    cmds:
      - terragrunt validate
      - terragrunt plan -out=tfplan
      - terragrunt apply tfplan

  destroy:
    desc: "Destroy component"
    dir: "{{.BASE}}/{{.COMPONENT}}"
    cmds:
      - terragrunt destroy -auto-approve

  kubeconfig:
    desc: "Update kubeconfig"
    dir: "{{.BASE}}/eks"
    cmds:
      - aws eks update-kubeconfig --name $(aws eks list-clusters --query 'clusters[]' --output text) --region $(aws configure get region)
