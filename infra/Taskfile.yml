version: "3"

vars:
  ENV: '{{.ENV | default "dev"}}'
  BASE: "aws/envs/{{.ENV}}"

tasks:
  default:
    silent: true
    cmds:
      - task --list
      - echo ""
      - echo "Order vpc > eks > cilium > group-nodes > platform/eks-addons > platform/argo-cd > karpenter"

  up:
    desc: "Deploy Full Stack (Correct Order)"
    cmds:
      - echo "Starting deployment..."
      - echo ""

      - echo "[1/7] Deploying VPC..."
      - task: apply
        vars: { COMPONENT: "vpc" }
      - echo "VPC deployed"
      - echo ""

      - echo "[2/7] Deploying EKS cluster..."
      - task: apply
        vars: { COMPONENT: "eks" }
      - echo "EKS deployed"
      - echo ""

      - echo "[3/7] Deploying Cilium CNI..."
      - task: apply
        vars: { COMPONENT: "cilium" }
      - echo "Cilium deployed"
      - echo ""

      - echo "[4/7] Deploying managed nodes..."
      - task: apply
        vars: { COMPONENT: "group-nodes" }
      - echo "Nodes deployed"
      - echo ""

      - echo "[5/7] Deploying EKS addons (CoreDNS)..."
      - task: apply
        vars: { COMPONENT: "platform/eks-addons" }
      - echo "EKS addons deployed"
      - echo ""

      - echo "[6/7] Deploying ArgoCD..."
      - task: apply
        vars: { COMPONENT: "platform/argo-cd" }
      - echo "ArgoCD deployed"
      - echo ""

      - echo "[7/7] Deploying Karpenter..."
      - task: apply
        vars: { COMPONENT: "karpenter" }
      - echo "Karpenter deployed"
      - echo ""

      - task: kubeconfig
      - echo ""
      - echo "Deployment complete!"

  down:
    desc: "Destroy Everything (Reverse Order)"
    prompt: "Destroy {{.ENV}}?"
    cmds:
      - echo "Starting destruction..."
      - echo ""
      - echo "Destroy complete!"

      - echo "[1/7] Destroying Karpenter..."
      - task: destroy
        vars: { COMPONENT: "karpenter" }
      - echo ""
      - echo "Destroy complete!"

      - echo "[2/7] Destroying ArgoCD..."
      - task: destroy
        vars: { COMPONENT: "platform/argo-cd" }
      - echo ""
      - echo "Destroy complete!"

      - echo "[3/7] Destroying EKS addons..."
      - task: destroy
        vars: { COMPONENT: "platform/eks-addons" }
      - echo ""
      - echo "Destroy complete!"

      - echo "[4/7] Destroying nodes..."
      - task: destroy
        vars: { COMPONENT: "group-nodes" }
      - echo ""
      - echo "Destroy complete!"

      - echo "[5/7] Destroying Cilium..."
      - task: destroy
        vars: { COMPONENT: "cilium" }
      - echo ""
      - echo "Destroy complete!"

      - echo "[6/7] Destroying EKS..."
      - task: destroy
        vars: { COMPONENT: "eks" }
      - echo ""
      - echo "Destroy complete!"

      - echo "[7/7] Destroying VPC..."
      - task: destroy
        vars: { COMPONENT: "vpc" }
      - echo ""
      - echo "Destroy complete!"

  apply:
    desc: "Apply component (task apply COMPONENT=vpc)"
    dir: "{{.BASE}}/{{.COMPONENT}}"
    cmds:
      - terragrunt apply -auto-approve

  destroy:
    desc: "Destroy component"
    dir: "{{.BASE}}/{{.COMPONENT}}"
    cmds:
      - terragrunt destroy -auto-approve

  plan:
    desc: "Plan component"
    dir: "{{.BASE}}/{{.COMPONENT}}"
    cmds:
      - terragrunt plan

  kubeconfig:
    desc: "Update kubeconfig"
    dir: "{{.BASE}}/eks"
    vars:
      CLUSTER:
      sh: "terragrunt output -raw cluster_name"
    cmds:
      - aws eks update-kubeconfig --name {{.CLUSTER}}
